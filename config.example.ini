; Example configuration for openclaw-mailbot.
; Copy to config.ini and adjust for your environment.

[pop3]
host = pop.example.com
port = 995
username = mailbot@example.com
; POP3_PASSWORD is read from the environment, not this file.

[mailbot]
; Base directory for saved attachments and UIDL state.
; Override with the MAILBOT_DATA_DIR environment variable.
data_dir = /var/lib/openclaw-mailbot

[forwarder]
webhook_url = https://openclaw.example.com/webhooks/email
timeout_seconds = 30
